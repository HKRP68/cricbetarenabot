name: Test and Deploy
on:
  push:
   branches: [main]
  pull_request:
   branches: [main]
jobs:
  lint:
   runs-on: ubuntu-latest
   steps:
    - uses: actions/checkout@v4
    - name: Set up Python
     uses: actions/setup-python@v5
     with:
      python-version: '3.11'



      cache: 'pip'

    - name: Install dependencies
     run: pip install -r requirements.txt
    - name: Run linting
     run: |
      pip install flake8
      flake8 bot/ --max-line-length=100 --ignore=E501,W503
  deploy:
   needs: lint
   runs-on: ubuntu-latest
   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
   steps:
    - name: Trigger Render Deploy
     run: |
      curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
      -H "Content-Type: application/json"














































21. Betting Math  Explained


Core Formula


Every bet is head-to-head (2 players):

pool = entry_amount x 2
commission = pool x (commission_pct / 100)
winner_payout = pool - commission
loser_payout = 0

Default commission: 16.67% (admin-configurable)

Tier Breakdown


Default Bet Tiers
Entry Pool  Commission(16.67%) Winner Gets Your Profit
------ ------ ------------------ ----------- -----------
Rs.3  Rs.6  Rs.1        Rs.5    Rs.2
Rs.5  Rs.10 Rs.1.67     Rs.9    Rs.4
Rs.10 Rs.20 Rs.3.33     Rs.18   Rs.8
Rs.25 Rs.50 Rs.8.33     Rs.45   Rs.20
Rs.50 Rs.100 Rs.16.67   Rs.90   Rs.40
Rs.100 Rs.200 Rs.33.33  Rs.180  Rs.80
Rs.500 Rs.1000 Rs.166.67 Rs.900 Rs.400
Rs.1000 Rs.2000 Rs.333.33 Rs.1800 Rs.800
ALL values admin-configurable via /admin -> Bot Settings
