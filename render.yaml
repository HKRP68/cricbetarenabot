services:
  - type: web
   name: cricbet-arena-bot
   runtime: python
   repo: https://github.com/YOUR_USERNAME/cricbet-arena-bot
   branch: main
   buildCommand: |
    pip install --upgrade pip &&
    pip install --no-cache-dir -r requirements.txt
   startCommand: python -m bot.main
   healthCheckPath: /health
   plan: free
   autoDeploy: true
   envVars:
    - key: BOT_TOKEN
     sync: false
    - key: BOT_USERNAME
     sync: false
    - key: SUPABASE_URL
     sync: false
    - key: SUPABASE_KEY
     sync: false
    - key: CRICKET_API_KEY
     sync: false
    - key: ADMIN_IDS
     sync: false
    - key: ADMIN_CHAT_ID
     sync: false
    - key: WEBHOOK_URL
     fromService:
      type: web
      name: cricbet-arena-bot
      property: host
    - key: WEBHOOK_SECRET
     generateValue: true
    - key: WEBHOOK_PATH
     value: /webhook
    - key: PORT
     value: 8080
    - key: LOG_LEVEL
     value: INFO
    - key: PYTHON_VERSION
     value: 3.11.0
